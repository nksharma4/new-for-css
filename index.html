<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        body{
            font-family: arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }
        .flex-container{
            display:flex;
            justify-content: space-around;
            margin-top: 30px;
        }
        .card{
            background-color: white;
            padding: 25 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width:230px;
            min-height: 150px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .card:hover{
            background-color: #2c3e50;
            color:white;
            transform: translateY(-10PX);
            cursor: pointer;
        }
    </style>
</head>
<body>
    
    <h1>cards in css</h1>
    <div class="flex-container">
        <div class="card">
            <h3>card 1</h3>
            <p>touch with the mouse</p></div>

            <div class="card">
                <h3>card 2</h3>
                <p>side because of flex</p>
            </div>

            <div class="card">
                <h3>card 3</h3>
                <p>professional look</p>
            </div>

        </div>
    </div>
</body>
</html>
